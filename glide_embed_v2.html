<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exportando...</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      color: #333;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .msg { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #888; }
    .error { color: #e53e3e; text-align: center; padding: 20px; }
  </style>
</head>
<body>

  <div id="status">
    <div class="icon">📊</div>
    <div class="msg">Gerando planilha...</div>
    <div class="sub">O download iniciará automaticamente.</div>
  </div>

  <script>
    // O Glide injeta a URL do CSV aqui via template column
    const csvUrl = "https://storage.googleapis.com/glide-prod.appspot.com/uploads-v2/dB8c5NI1Bf2PClFLL14I/pub/aCLhExHBZFinw1gVkwtU/Prote%C3%ADnas.csv";

    async function exportarXLSX() {
      try {
        if (!csvUrl || csvUrl === "{{URL do CSV}}") {
          throw new Error("URL do CSV não encontrada.");
        }

        // Busca o CSV
        const response = await fetch(csvUrl);
        if (!response.ok) throw new Error("Erro ao buscar o CSV.");
        const csvText = await response.text();

        // Converte CSV para XLSX usando SheetJS
        const wb = XLSX.read(csvText, { type: "string" });
        wb.SheetNames[0] = "Relatório";

        // Gera o arquivo .xlsx como blob
        const wbout = XLSX.write(wb, { bookType: "xlsx", type: "array" });
        const blob = new Blob([wbout], {
          type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        });

        // Dispara o download automaticamente
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Relatorio_" + new Date().toLocaleDateString("pt-BR").replace(/\//g, "-") + ".xlsx";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        document.getElementById("status").innerHTML = `
          <div class="icon">✅</div>
          <div class="msg">Download iniciado!</div>
          <div class="sub">Pode fechar esta janela.</div>
        `;

      } catch (err) {
        document.getElementById("status").innerHTML = `
          <div class="icon">❌</div>
          <div class="error">
            <strong>Erro ao gerar planilha</strong><br>${err.message}
          </div>
        `;
      }
    }

    window.addEventListener("load", exportarXLSX);
  </script>

</body>
</html>
