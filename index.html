<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <script>
    async function exportarXLSX() {
      const params = new URLSearchParams(window.location.search);
      const csvUrl = params.get("csv");
      if (!csvUrl) return;

      const response = await fetch(csvUrl);
      const csvText = (await response.text()).replace(/^\uFEFF/, ""); // remove BOM

      const wb = XLSX.read(csvText, { type: "string" });
      wb.SheetNames[0] = "Relatório";

      const wbout = XLSX.write(wb, { bookType: "xlsx", type: "array" });
      const blob = new Blob([wbout], {
        type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "Relatorio_" + new Date().toLocaleDateString("pt-BR").replace(/\//g, "-") + ".xlsx";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    window.addEventListener("load", exportarXLSX);
  </script>
</body>
</html>
